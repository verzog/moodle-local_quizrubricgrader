name: moodle-ci

on:
  push:
    branches:
      - main
  pull_request:

env:
  TZ: Australia/Sydney

concurrency:
  group: moodle-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        # Pinned to a specific patch tag for reproducibility; swap to an
        # immutable digest (postgres:16@sha256:...) if you want stricter
        # pinning.
        image: postgres:16.6
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      mysql:
        image: mysql:8.4.3
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        moodle-branch: ['MOODLE_500_STABLE', 'MOODLE_501_STABLE', 'MOODLE_502_STABLE', 'main']
        database: ['pgsql', 'mysqli']
        exclude:
          # Moodle 5.2+ requires PHP 8.3 or newer.
          - php: '8.2'
            moodle-branch: 'MOODLE_502_STABLE'
          - php: '8.2'
            moodle-branch: 'main'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: max_input_vars=5000
          coverage: none

      - name: Initialise moodle-plugin-ci
        run: |
          attempts=0
          until composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4; do
            attempts=$((attempts + 1))
            if [ $attempts -ge 3 ]; then
              echo "composer create-project failed after $attempts attempts" >&2
              exit 1
            fi
            echo "composer create-project attempt $attempts failed, retrying..."
            rm -rf ci
            sleep $((attempts * 5))
          done
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV
      - name: Install moodle-plugin-ci
        id: install
        run: |
          attempts=0
          until moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1; do
            attempts=$((attempts + 1))
            if [ $attempts -ge 3 ]; then
              echo "moodle-plugin-ci install failed after $attempts attempts" >&2
              exit 1
            fi
            echo "moodle-plugin-ci install attempt $attempts failed, retrying..."
            sleep $((attempts * 10))
          done
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phplint

      - name: Moodle Code Checker
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0

      - name: PHPUnit tests
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci phpunit --fail-on-warning

      - name: Behat features
        if: ${{ !cancelled() && steps.install.conclusion == 'success' }}
        run: moodle-plugin-ci behat --profile chrome
